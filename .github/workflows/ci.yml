name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  # ===========================================================================
  # Backend CI
  # ===========================================================================
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: ./mvnw clean verify -B

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/**/target/surefire-reports/
          retention-days: 7

      - name: Build Lambda package
        run: ./mvnw package -P lambda -DskipTests -B

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-lambda-jar
          path: backend/quickstack-app/target/quickstack-app-0.0.1-SNAPSHOT.jar
          retention-days: 1

  # ===========================================================================
  # Security Scanning
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # SAST with Semgrep
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/java
            p/security-audit
            p/secrets
            p/owasp-top-ten

      # SCA with OWASP Dependency-Check
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-owasp-nvd-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-owasp-nvd-

      - name: OWASP Dependency-Check
        working-directory: backend
        run: |
          ./mvnw org.owasp:dependency-check-maven:check -B \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFile=.dependency-check-suppressions.xml || true

      - name: Upload dependency check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: backend/target/dependency-check-report.html
          retention-days: 7

  # ===========================================================================
  # Frontend CI (placeholder for Phase 0.4)
  # ===========================================================================
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.quickstack.com.mx

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ===========================================================================
  # Deploy to AWS Serverless (Terraform & S3)
  # ===========================================================================
  deploy:
    name: Deploy Infrastructure & App
    runs-on: ubuntu-latest
    needs: [backend, frontend, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-lambda-jar
          path: backend/quickstack-app/target/

      - name: Download Frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: mx-central-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -var="aws_region=mx-central-1" -var="environment=prod"

      - name: Deploy Frontend to S3
        working-directory: terraform
        run: |
          BUCKET_NAME=$(terraform output -raw frontend_bucket_name)
          aws s3 sync ../frontend/dist/ s3://$BUCKET_NAME --delete

      - name: Invalidate CloudFront Cache
        working-directory: terraform
        run: |
          CF_ID=$(terraform output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation --distribution-id $CF_ID --paths "/*"
